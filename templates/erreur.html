{% extends "base.html" %}
{% block title %}Erreur {{ code }}{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-20">
    <div class="text-6xl font-bold text-erpac-primary mb-4">{{ code }}</div>
    <h1 class="text-2xl font-semibold text-gray-800 mb-2">{{ titre }}</h1>
    <p class="text-gray-500 mb-8">{{ message }}</p>
    <a href="{{ url_for('index') }}"
       class="bg-erpac-primary hover:bg-erpac-dark text-white font-semibold py-3 px-6 rounded-lg transition shadow">
        Retour à l'accueil
    </a>
</div>
{% endblock %}
