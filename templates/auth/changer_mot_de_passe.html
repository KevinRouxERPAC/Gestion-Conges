{% extends "base.html" %}
{% block title %}Changer mon mot de passe{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Changer mon mot de passe</h1>
            <p class="text-gray-500 mt-2 text-sm">{{ current_user.prenom }} {{ current_user.nom }}</p>
        </div>

        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="mot_de_passe_actuel" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe actuel</label>
                <input type="password" id="mot_de_passe_actuel" name="mot_de_passe_actuel" required autofocus autocomplete="current-password"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-erpac-primary focus:border-erpac-primary transition"
                       placeholder="Votre mot de passe actuel">
            </div>

            <div>
                <label for="nouveau_mot_de_passe" class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label>
                <input type="password" id="nouveau_mot_de_passe" name="nouveau_mot_de_passe" required minlength="8" autocomplete="new-password"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-erpac-primary focus:border-erpac-primary transition"
                       placeholder="Au moins 8 caractères">
                <p class="text-xs text-gray-500 mt-1">8 caractères minimum.</p>
            </div>

            <div>
                <label for="confirmation_mot_de_passe" class="block text-sm font-medium text-gray-700 mb-1">Confirmer le nouveau mot de passe</label>
                <input type="password" id="confirmation_mot_de_passe" name="confirmation_mot_de_passe" required minlength="8" autocomplete="new-password"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-erpac-primary focus:border-erpac-primary transition"
                       placeholder="Retapez le nouveau mot de passe">
            </div>

            <button type="submit"
                    class="w-full bg-erpac-primary hover:bg-erpac-dark text-white font-semibold py-3 px-4 rounded-lg transition shadow-md hover:shadow-lg">
                Mettre à jour
            </button>
        </form>
    </div>
</div>
{% endblock %}
